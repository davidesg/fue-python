name: Build wheels

# Builds cp310-cp313 binary wheels (Linux x86_64+aarch64, macOS Intel+ARM,
# Windows AMD64) with GSL bundled, plus the pure-Python wheel and the sdist.
# Runs on demand (workflow_dispatch) for validation; publishes to PyPI on v* tags.

on:
  push:
    tags:
      - "v*"          # build + publish on version tags
  workflow_dispatch:  # manual trigger from GitHub UI

jobs:
  build_wheels:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macOS runners are PINNED (not macos-latest): Homebrew's GSL bottle
        # targets the runner's OS, and macos-latest has drifted to macOS 26, whose
        # bottle can't be bundled into a lower-target wheel (delocate rejects it).
        # Pinning + matching MACOSX_DEPLOYMENT_TARGET keeps bottle and wheel targets
        # aligned and immune to future runner-OS bumps.
        include:
          - os: ubuntu-latest     # Linux x86_64 (+ aarch64 via QEMU)
          - os: macos-13          # macOS Intel x86_64
            macos_target: "13.0"
          - os: macos-14          # macOS Apple Silicon arm64
            macos_target: "14.0"
          - os: windows-latest    # Windows x86_64 (AMD64)

    steps:
      - uses: actions/checkout@v4

      # QEMU lets cibuildwheel build aarch64 wheels on x86_64 GitHub runners.
      - name: Set up QEMU (Linux only)
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: aarch64

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22
        env:
          # Build aarch64 on Linux as well as x86_64
          CIBW_ARCHS_LINUX: "x86_64 aarch64"
          # macOS only (empty elsewhere): bundle GSL for the runner's OS and tag
          # the wheel for the same minimum, so delocate is satisfied.
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_target }}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  # ── Pure-Python wheel (no C extension, no GSL required) ──────────────────
  build_pure_wheel:
    name: Pure-Python wheel (no C)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build
        run: pip install build

      - name: Build pure-Python wheel
        run: python -m build --wheel
        env:
          FUE_SKIP_C: "1"

      - name: Smoke-test pure wheel
        run: |
          pip install "dist/fue-"*"-py3-none-any.whl" pytest
          pytest tests/test_smoke.py -q   # smoke only; golden battery is platform-sensitive

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-pure
          path: dist/fue-*-py3-none-any.whl

  # ── Source distribution ────────────────────────────────────────────────────
  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build
        run: pip install build

      - name: Build sdist
        run: python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ── Publish to PyPI on version tags ───────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_pure_wheel, build_sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write   # required for trusted publishing (OIDC)

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "wheels-*"   # matches wheels-ubuntu-latest, wheels-macos-*, wheels-windows-latest, wheels-pure
          merge-multiple: true
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
