[build-system]
requires = ["setuptools>=60", "cffi>=1.15", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name            = "fue"
version         = "0.1.0"
description     = "Exact maximum likelihood estimation of univariate time series (ARMAX with transfer functions)"
license         = { text = "GPL-2.0-or-later" }
requires-python = ">=3.10"
dependencies    = [
    "numpy>=1.24",
    "scipy>=1.10",
    "matplotlib>=3.7",
    "cffi>=1.15",
]

[project.optional-dependencies]
dev = ["pytest>=7", "pandas"]

[tool.setuptools.packages.find]
where = ["src"]

